<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <script>
        // GitHub Pages SPA redirect fix
        var path = window.location.pathname;
        var repo = "/mapTravelsAndTours";
        window.location.replace(repo + "/?p=" + path.replace(repo, ""));
    </script>
</head>

</html>
