<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Store the path that was requested so React Router can redirect to it
        const pathname = window.location.pathname;
        const search = window.location.search;
        
        // Store the full path in sessionStorage
        sessionStorage.redirect = pathname + search;
        
        // Redirect to home - use location.href for more reliable redirect
        window.location.href = '/mapTravelsAndTours/';
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
